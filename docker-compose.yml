services:
    app:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: development
        container_name: laravel-app
        restart: unless-stopped
        volumes:
            - .:/var/www/html
        networks:
            - laravel
        depends_on:
            - mysql
            - redis

    worker:
        build:
            context: .
            dockerfile: docker/php/Dockerfile
            target: development
        container_name: laravel-worker
        restart: unless-stopped
        command: php artisan queue:work --verbose --tries=3 --timeout=90
        volumes:
            - .:/var/www/html
        networks:
            - laravel
        depends_on:
            - mysql
            - redis
            - app

    nginx:
        image: nginx:alpine
        container_name: laravel-nginx
        restart: unless-stopped
        ports:
            - "${APP_PORT:-8000}:80"
        volumes:
            - .:/var/www/html
            - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
        networks:
            - laravel
        depends_on:
            - app

    mysql:
        image: mysql:8.0
        container_name: laravel-mysql
        restart: unless-stopped
        ports:
            - "${FORWARD_DB_PORT:-3306}:3306"
        environment:
            MYSQL_DATABASE: ${DB_DATABASE:-laravel}
            MYSQL_USER: ${DB_USERNAME:-sail}
            MYSQL_PASSWORD: ${DB_PASSWORD:-password}
            MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
        volumes:
            - ./docker/mysql/data:/var/lib/mysql
        networks:
            - laravel

    redis:
        image: redis:alpine
        container_name: laravel-redis
        restart: unless-stopped
        ports:
            - "${FORWARD_REDIS_PORT:-6379}:6379"
        volumes:
            - ./docker/redis/data:/data
        networks:
            - laravel

    loki:
        image: grafana/loki:latest
        container_name: laravel-loki
        ports:
            - "3100:3100"
        command: -config.file=/etc/loki/local-config.yaml
        networks:
            - laravel

    promtail:
        image: grafana/promtail:latest
        container_name: laravel-promtail
        volumes:
            - ./storage/logs:/var/log/laravel
            - ./docker/observability/promtail-config.yml:/etc/promtail/config.yml
        command: -config.file=/etc/promtail/config.yml
        networks:
            - laravel
        depends_on:
            - loki

    grafana:
        image: grafana/grafana:latest
        container_name: laravel-grafana
        ports:
            - "3000:3000"
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=admin
        networks:
            - laravel
        depends_on:
            - loki

networks:
    laravel:
        driver: bridge
