server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: laravel_logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: laravel
          __path__: /var/log/laravel/*.log
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            method: method
            url: url
            status: status
            duration_ms: duration_ms
            user_id: user_id
      - timestamp:
          source: timestamp
          format: RFC3339
